name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24.x', cache: 'npm' }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run diag:mdx
      - run: npm run diag:logos
      - run: npm run diag:nav
      # smoke opcional (exige app rodando) — pode habilitar depois com vercel preview, por ex.
